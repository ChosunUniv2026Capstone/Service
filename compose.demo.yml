services:
  postgres:
    restart: unless-stopped

  redis:
    restart: unless-stopped

  presence-service:
    restart: unless-stopped

  backend:
    restart: unless-stopped
    environment:
      ACCESS_COOKIE_SECURE: ${ACCESS_COOKIE_SECURE:-true}
      ACCESS_COOKIE_SAMESITE: ${ACCESS_COOKIE_SAMESITE:-lax}

  front:
    restart: unless-stopped

  nginx:
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-3100}:80"
    volumes:
      - ./nginx/demo.conf:/etc/nginx/conf.d/default.conf:ro
