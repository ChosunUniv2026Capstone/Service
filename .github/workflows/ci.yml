name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  service-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Render local compose config
        run: docker compose --project-directory . -f compose.yml -f compose.local.yml config
      - name: Render image compose config
        env:
          BACKEND_IMAGE: ghcr.io/chosununiv2026capstone/backend:sha-ci
          FRONT_IMAGE: ghcr.io/chosununiv2026capstone/front:sha-ci
          PRESENCE_SERVICE_IMAGE: ghcr.io/chosununiv2026capstone/presence-service:sha-ci
          DB_IMAGE: ghcr.io/chosununiv2026capstone/db:sha-ci
        run: docker compose --project-directory . -f compose.yml -f compose.image.yml config
      - name: Render demo compose config
        env:
          BACKEND_IMAGE: ghcr.io/chosununiv2026capstone/backend:sha-ci
          FRONT_IMAGE: ghcr.io/chosununiv2026capstone/front:sha-ci
          PRESENCE_SERVICE_IMAGE: ghcr.io/chosununiv2026capstone/presence-service:sha-ci
          DB_IMAGE: ghcr.io/chosununiv2026capstone/db:sha-ci
        run: docker compose --project-directory . -f compose.yml -f compose.image.yml -f compose.demo.yml config
      - name: Validate nginx configs
        run: |
          for conf in nginx/local.conf nginx/demo.conf; do
            docker run --rm -v "$PWD/$conf:/etc/nginx/conf.d/default.conf:ro" nginx:1.27-alpine nginx -t
          done
      - name: Validate release manifest examples
        run: |
          ./scripts/validate-release-manifest.sh --service-version v0.1.0 manifests/service-manifest.example.yml
          ./scripts/render-release-env.sh manifests/service-manifest.example.yml
          if [ -f "manifests/releases/v$(cat version.txt).yml" ]; then
            ./scripts/validate-release-manifest.sh --service-version "v$(cat version.txt)" "manifests/releases/v$(cat version.txt).yml"
            ./scripts/render-release-env.sh "manifests/releases/v$(cat version.txt).yml"
          fi
      - name: Run release manifest contract tests
        run: python3 -m pytest tests/test_release_manifest_contract.py
