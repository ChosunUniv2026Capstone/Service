name: ${COMPOSE_PROJECT_NAME:-smart-class}

services:
  postgres:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smartclass}
      POSTGRES_USER: ${POSTGRES_USER:-smartclass}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smartclass}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-smartclass} -d $${POSTGRES_DB:-smartclass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  presence-service:
    environment:
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
    depends_on:
      redis:
        condition: service_healthy

  backend:
    environment:
      SERVICE_PORT: ${SERVICE_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://smartclass:smartclass@postgres:5432/smartclass}
      PRESENCE_SERVICE_URL: ${PRESENCE_SERVICE_URL:-http://presence-service:8001}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      JWT_SECRET: ${JWT_SECRET:-smart-class-dev-jwt-secret}
      ACCESS_COOKIE_SECURE: ${ACCESS_COOKIE_SECURE:-false}
      ACCESS_COOKIE_SAMESITE: ${ACCESS_COOKIE_SAMESITE:-lax}
    depends_on:
      postgres:
        condition: service_healthy
      presence-service:
        condition: service_started

  front:
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      front:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-3100}:80"
    volumes:
      - ./nginx/local.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
  redis-data:
